<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>"
    />
    <title>Checkout cancelado — Casa Coffee Colab</title>
    <meta name="description" content="Tudo certo — a assinatura fica pra próxima. Passa aqui quando quiser." />
    <meta name="robots" content="noindex" />
  </head>
  <body class="min-h-screen">
    <!-- Header injetado pelo app.js -->
    <div id="site-header"></div>

    <main>
      <section class="py-16 sm:py-24">
        <div class="mx-auto max-w-md px-4 text-center sm:px-6">
          <span class="mx-auto grid h-16 w-16 place-items-center rounded-full bg-terracota/10 text-terracota">
            <i data-lucide="coffee" class="h-8 w-8"></i>
          </span>
          <h1 class="mt-5 font-titulo text-3xl sm:text-4xl">sem problema, fica pra próxima</h1>
          <p class="mt-3 text-cafe/70">
            a gente não cobrou nada. o teu plano continua te esperando aqui, sem
            pressa nenhuma. quando bater a vontade, é só voltar.
          </p>
          <p class="mt-2 text-sm text-cafe/50">enquanto isso, passa aqui pra um café? 💛</p>
          <div class="mt-7 flex flex-col items-center gap-3 sm:flex-row sm:justify-center">
            <a href="/pages/planos.html" class="btn-primary">ver os planos de novo</a>
            <a href="/pages/home.html" class="btn-ghost">voltar pra casa</a>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer injetado pelo app.js -->
    <div id="site-footer"></div>

    <script type="module" src="../app.js"></script>
  </body>
</html>
