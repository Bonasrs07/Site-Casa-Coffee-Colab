<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>"
    />
    <title>Tuas conquistas — Casa Coffee Colab</title>
    <meta name="description" content="As conquistas que tu desbloqueia usando o Casa — teus emblemas, no teu tempo." />
    <meta name="robots" content="noindex" />
  </head>
  <body class="min-h-screen" data-requires-auth>
    <!-- Header injetado pelo app.js -->
    <div id="site-header"></div>

    <main>
      <section class="py-14 sm:py-20">
        <div class="mx-auto max-w-4xl px-4 sm:px-6">
          <!-- Conteúdo injetado pelo app.js (initConquistasPage), depois do guard de auth. -->
          <div data-conquistas-root>
            <p class="text-center text-cafe/60">só um instante, juntando teus emblemas…</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer injetado pelo app.js -->
    <div id="site-footer"></div>

    <script type="module" src="../../app.js"></script>
  </body>
</html>
