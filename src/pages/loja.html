<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>"
    />
    <title>A loja do Casa — Casa Coffee Colab</title>
    <meta
      name="description"
      content="Vestuário, acessórios e café em grão do Casa Coffee Colab. Leva junto um pedacinho da casa."
    />
  </head>
  <body class="min-h-screen">
    <!-- Header injetado pelo app.js -->
    <div id="site-header"></div>

    <main class="mx-auto max-w-7xl px-4 py-12 sm:px-6 sm:py-16 3xl:max-w-[1600px]">
      <header class="max-w-2xl">
        <p class="decor text-2xl sm:text-3xl">passa aqui?</p>
        <h1 class="mt-1 font-titulo text-4xl sm:text-5xl">A loja do Casa</h1>
        <p class="mt-3 text-cafe/70">
          vestuário, acessórios e café em grão — feitos com afeto pra levar junto, no teu ritmo.
        </p>
      </header>

      <!-- Filtro por categoria -->
      <div class="mt-8 flex flex-wrap gap-2" role="group" aria-label="Filtrar por categoria">
        <button type="button" class="filtro" data-filter="all" aria-pressed="true">Todos</button>
        <button type="button" class="filtro" data-filter="vestuario" aria-pressed="false">Vestuário</button>
        <button type="button" class="filtro" data-filter="acessorios" aria-pressed="false">Acessórios</button>
        <button type="button" class="filtro" data-filter="cafe_grao" aria-pressed="false">Café em grão</button>
      </div>

      <!-- Grid preenchido pelo app.js (initCatalogPage) -->
      <div
        data-catalog-grid
        class="mt-8 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 lg:gap-6"
      ></div>

      <!-- Estado vazio (some quando há resultados) -->
      <p data-catalog-empty class="hidden py-16 text-center text-cafe/60">
        nada por aqui ainda — mas logo a gente traz novidade.
      </p>
    </main>

    <!-- Footer injetado pelo app.js -->
    <div id="site-footer"></div>

    <script type="module" src="../app.js"></script>
  </body>
</html>
